name: Build and Deploy Docker Container

on:
  push:
    branches: ["main", "develop", "staging"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{date 'YYYYMMDD'}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-development:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: development

    steps:
      - name: Deploy to development server
        uses: appleboy/ssh-action@master
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || secrets.DEVELOPMENT_HOST_IP }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || secrets.DEVELOPMENT_USERNAME }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY || secrets.DEVELOPMENT_SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/var/www/app/bisa-backend/b2b-bisa' }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            echo "=========================================="
            echo "🚀 STARTING DEVELOPMENT DEPLOYMENT"
            echo "=========================================="
            echo "📅 Timestamp: $(date)"
            echo "🔗 Commit: ${{ github.sha }}"
            echo "=========================================="

            cd "$DEPLOY_PATH"
            echo "Using deploy path: $DEPLOY_PATH"
            docker-compose -f docker-compose.prod.yml pull || true
            docker-compose -f docker-compose.prod.yml up -d app || true
            sleep 20
            docker exec backend-app npx prisma migrate deploy || echo "⚠️ Migration failed or no migrations pending"
            docker-compose -f docker-compose.prod.yml down || true
            docker-compose -f docker-compose.prod.yml up -d || true
            sleep 15
            docker exec backend-app curl -f http://localhost:3000/health || echo "⚠️ Health check failed"
            echo "Development deployment completed!"

      - name: Notify deployment status
        if: always()
        run: |
          echo "Development deployment status: ${{ job.status }}"

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/code-optimazed' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || secrets.STAGING_HOST_IP }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || secrets.STAGING_USERNAME }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY || secrets.STAGING_SSH_PRIVATE_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/var/www/app/bisa-backend/b2b-bisa' }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}

    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e  # Stop on error

            echo "=========================================="
            echo "🚀 STARTING STAGING DEPLOYMENT"
            echo "=========================================="
            echo "📅 Timestamp: $(date)"
            echo "🔗 Commit: ${{ github.sha }}"
            echo "👤 Deployed by: ${{ github.actor }}"
            echo "=========================================="

            cd "$DEPLOY_PATH"
            echo "Using deploy path: $DEPLOY_PATH"

            # PHASE 1: PRE-DEPLOYMENT CHECK
            echo ""
            echo "🔍 PHASE 1: PRE-DEPLOYMENT CHECK"
            echo "=========================================="
            
            # Check current image version
            echo "📋 Current image before deploy:"
            docker images | grep backend || echo "No existing image found"
            
            # Check current container status
            echo "Current container status:"
            docker-compose -f docker-compose.prod.yml ps || echo "No running containers"

            # PHASE 1.5: CREATE ENVIRONMENT FILE
            echo ""
            echo "⚙️ PHASE 1.5: CREATING ENVIRONMENT FILE"
            echo "=========================================="
            cat > .env << 'EOF'
            DEPLOYMENT_TIMESTAMP=$(date)
            GIT_COMMIT=${{ github.sha }}
            DEPLOYED_BY=GitHub Actions

            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DATABASE_NAME=${{ secrets.DATABASE_NAME }}
            DATABASE_PORT=${{ secrets.DATABASE_PORT }}
            DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
            DATABASE_USER=${{ secrets.DATABASE_USER }}
            DATABASE_HOST=${{ secrets.DATABASE_HOST }}

            NODE_ENV=production
            PORT=3000
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}

            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN || '1d' }}
            JWT_REFRESH_EXPIRES_IN=${{ secrets.JWT_REFRESH_EXPIRES_IN || '30d' }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            ENCRYPTION_KEY_V2=${{ secrets.ENCRYPTION_KEY_V2 }}

            CLIENT_HOST=${{ secrets.CLIENT_HOST }}

            EMAIL_SMTP_SECURE=${{ secrets.EMAIL_SMTP_SECURE }}
            EMAIL_SMTP_USER=${{ secrets.EMAIL_SMTP_USER }}
            EMAIL_SMTP_PASS=${{ secrets.EMAIL_SMTP_PASS }}
            EMAIL_SMTP_PORT=${{ secrets.EMAIL_SMTP_PORT }}
            EMAIL_SMTP_HOST=${{ secrets.EMAIL_SMTP_HOST }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM }}
            EMAIL_SENDER_NAME=${{ secrets.EMAIL_SENDER_NAME }}

            PUSHER_APP_ID=${{ secrets.PUSHER_APP_ID }}
            PUSHER_KEY=${{ secrets.PUSHER_KEY }}
            PUSHER_SECRET=${{ secrets.PUSHER_SECRET }}
            PUSHER_CLUSTER=${{ secrets.PUSHER_CLUSTER }}

            R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}
            R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
            R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
            R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}
            R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}

            API_PUBLIC_URL=${{ secrets.API_PUBLIC_URL }}
            MEDIA_BASE_URL=${{ secrets.MEDIA_BASE_URL }}

            XENDIT_PAYMENT_SECRET_KEY=${{ secrets.XENDIT_PAYMENT_SECRET_KEY }}
            XENDIT_PAYOUT_SECRET_KEY=${{ secrets.XENDIT_PAYOUT_SECRET_KEY }}
            XENDIT_REPORT_SECRET_KEY=${{ secrets.XENDIT_REPORT_SECRET_KEY }}
            XENDIT_PUBLIC_KEY=${{ secrets.XENDIT_PUBLIC_KEY }}
            XENDIT_WEBHOOK_TOKEN=${{ secrets.XENDIT_WEBHOOK_TOKEN }}

            REDIS_URL=${{ secrets.REDIS_URL }}
            REDIS_ENABLED=${{ secrets.REDIS_ENABLED || 'false' }}
            REDIS_KEY_PREFIX=${{ secrets.REDIS_KEY_PREFIX || 'bisa:v1' }}
            REDIS_DEFAULT_TTL_SECONDS=${{ secrets.REDIS_DEFAULT_TTL_SECONDS || '3600' }}

            ML_SERVICE_URL=${{ secrets.ML_SERVICE_URL }}
            ML_PREDICT_ENABLED=${{ secrets.ML_PREDICT_ENABLED || 'true' }}
            LOG_LEVEL=${{ secrets.LOG_LEVEL || 'info' }}

            CHROMA_HOST=${{ secrets.CHROMA_HOST }}
            CHROMA_API_KEY=${{ secrets.CHROMA_API_KEY }}
            CHROMA_TENANT=${{ secrets.CHROMA_TENANT }}
            CHROMA_DATABASE=${{ secrets.CHROMA_DATABASE }}
            CHROMA_COLLECTION=${{ secrets.CHROMA_COLLECTION }}
            DEEPSHEEK_API_KEY=${{ secrets.DEEPSHEEK_API_KEY }}
            DEEPSHEEK_MODEL=${{ secrets.DEEPSHEEK_MODEL }}

            USER_ID_RAJA_ONGKIR=${{ secrets.USER_ID_RAJA_ONGKIR }}
            SECRET_KEY_RAJA_ONGKIR=${{ secrets.SECRET_KEY_RAJA_ONGKIR }}
            SHIPPING_COST_API_KEY=${{ secrets.SHIPPING_COST_API_KEY }}
            PAYMENT_API_KEY=${{ secrets.PAYMENT_API_KEY }}
            QRISLY_API_KEY=${{ secrets.QRISLY_API_KEY }}

            PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
            PIXABAY_API_KEY=${{ secrets.PIXABAY_API_KEY }}

            FIREBASE_SERVICE_ACCOUNT=${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
            FIREBASE_SERVICE_ACCOUNT_PATH=${{ secrets.FIREBASE_SERVICE_ACCOUNT_PATH }}

            READINESS_GATES_ENABLED=${{ secrets.READINESS_GATES_ENABLED || 'true' }}
            READINESS_ENFORCE_ADMIN=${{ secrets.READINESS_ENFORCE_ADMIN || 'false' }}
            REQUIRE_KYC_FOR_ACTIVE_PRODUCT=${{ secrets.REQUIRE_KYC_FOR_ACTIVE_PRODUCT || 'false' }}

            MEDIA_CHUNK_SIZE_BYTES=${{ secrets.MEDIA_CHUNK_SIZE_BYTES || '5242880' }}
            MEDIA_UPLOAD_SESSION_TTL_HOURS=${{ secrets.MEDIA_UPLOAD_SESSION_TTL_HOURS || '24' }}
            MEDIA_MAX_IMAGE_BYTES=${{ secrets.MEDIA_MAX_IMAGE_BYTES || '52428800' }}
            MEDIA_MAX_PDF_BYTES=${{ secrets.MEDIA_MAX_PDF_BYTES || '20971520' }}
            MEDIA_UPLOAD_PROXY_MODE=${{ secrets.MEDIA_UPLOAD_PROXY_MODE || 'true' }}

            PUBLIC_VERIFY_BASE_URL=${{ secrets.PUBLIC_VERIFY_BASE_URL }}
            SUPPORT_WHATSAPP=${{ secrets.SUPPORT_WHATSAPP }}
            SUPPORT_EMAIL=${{ secrets.SUPPORT_EMAIL }}

            RAJAONGKIR_BASE_URL=${{ secrets.RAJAONGKIR_BASE_URL }}
            RAJAONGKIR_DEFAULT_COURIERS=${{ secrets.RAJAONGKIR_DEFAULT_COURIERS }}
            RAG_ENABLED=${{ secrets.RAG_ENABLED || 'true' }}
            EOF
            chmod 600 .env
            echo "✅ .env file automatically created from GitHub Secrets!"

            # PHASE 2: PULL LATEST IMAGE
            echo ""
            echo "📦 PHASE 2: PULLING LATEST IMAGE"
            echo "=========================================="
            echo "⬇️ Pulling latest image..."
            docker-compose -f docker-compose.prod.yml pull
            
            echo "📋 New image version:"
            docker images | grep bisa | head -1

            # PHASE 3: RUN DATABASE MIGRATIONS (BEFORE CONTAINER RESTART)
            echo ""
            echo "🗄️ PHASE 3: DATABASE MIGRATIONS"
            echo "=========================================="
            
            # Start app container temporarily to run migrations
            echo "Starting app container for migrations..."
            docker-compose -f docker-compose.prod.yml up -d app
            
            # Wait for app to be ready with better diagnostics
            echo " Waiting for app to be ready (180 seconds)..."
            sleep 90

            # Health check before migration with container logs
            echo "Checking app health..."
            MAX_RETRIES=18
            RETRY_COUNT=0
            until docker exec bisa-app curl -f -s http://localhost:3000/ || [ $RETRY_COUNT -eq $MAX_RETRIES ]; do
              echo " App not ready, retrying... ($RETRY_COUNT/$MAX_RETRIES)"
              RETRY_COUNT=$((RETRY_COUNT+1))

              # Show last 20 lines of container logs for debugging
              echo " Container logs:"
              docker logs bisa-app --tail 20 || echo "Could not fetch logs"

              sleep 10
            done

            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo " App failed to start. Aborting deployment."
              echo ""
              echo "=== FULL CONTAINER LOGS ==="
              docker logs bisa-app || echo "Could not fetch full logs"
              echo "=== END LOGS ==="
              echo ""
              echo "=== CONTAINER STATUS ==="
              docker ps -a | grep bisa || echo "No containers found"
              echo "=== END STATUS ==="
              exit 1
            fi

            echo "App is ready!"

            # Run Prisma migrations
            echo "🗄️ Running Prisma migrations..."
            docker exec bisa-app npx prisma migrate deploy
            echo "✅ Database migrations successfully applied!"

            # Verify migration status
            echo "Migration status:"
            docker exec bisa-app npx prisma migrate status || echo "⚠️ Could not get migration status"

            # PHASE 4: RESTART APPLICATION WITH NEW IMAGE
            echo ""
            echo "PHASE 4: RESTARTING APPLICATION"
            echo "=========================================="

            # Stop all containers
            echo "Stopping all containers..."
            docker-compose -f docker-compose.prod.yml down

            # Start new containers
            echo "Starting new containers..."
            docker-compose -f docker-compose.prod.yml up -d

            # Wait for app to stabilize
            echo " Waiting for app to stabilize (60 seconds)..."
            sleep 60

            # PHASE 5: POST-DEPLOYMENT VERIFICATION
            echo ""
            echo "PHASE 5: POST-DEPLOYMENT VERIFICATION"
            echo "=========================================="

            # Show container status
            echo "Container status:"
            docker-compose -f docker-compose.prod.yml ps

            # Show recent logs
            echo "Recent logs (last 30 lines):"
            docker-compose -f docker-compose.prod.yml logs --tail=30 app

            # Health check with retry
            echo "Performing health check..."
            HEALTH_RETRY=0
            HEALTH_MAX=6
            until docker exec bisa-app curl -f -s http://localhost:3000/ || [ $HEALTH_RETRY -eq $HEALTH_MAX ]; do
              echo " Health check failed, retrying... ($HEALTH_RETRY/$HEALTH_MAX)"
              HEALTH_RETRY=$((HEALTH_RETRY+1))
              sleep 10
            done

            if [ $HEALTH_RETRY -eq $HEALTH_MAX ]; then
              echo " Health check failed after $HEALTH_MAX retries!"
              exit 1
            fi
            echo "Health check passed!"

            # Check PM2 status (if using PM2 inside container)
            echo "Application status:"
            docker exec bisa-app pm2 status || echo "PM2 not running or not installed"

            # PHASE 6: CLEANUP
            echo ""
            echo "PHASE 6: CLEANUP"
            echo "=========================================="
            echo "Cleaning up old images..."
            docker image prune -f

            echo ""
            echo "=========================================="
            echo "STAGING DEPLOYMENT COMPLETED SUCCESSFULLY!"
            echo "=========================================="
            echo "Summary:"
            echo "  Image: Updated"
            echo "  Database: Migrated"
            echo "  Containers: Running"
            echo "  Health Check: Passed"
            echo "=========================================="

      - name: Notify deployment success
        if: success()
        run: |
          echo "🎉 Staging deployment completed successfully!"
          echo "Database migrations: Applied"
          echo "Application: Running"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo " Staging deployment FAILED!"
          echo "🔍 Please check the workflow logs for details"
          echo "🔗 Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || secrets.HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || secrets.USERNAME }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/var/www/app/bisa-backend/b2b-bisa' }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e  # Stop on error

            echo "=========================================="
            echo "🚀 STARTING PRODUCTION DEPLOYMENT"
            echo "=========================================="
            echo "📅 Timestamp: $(date)"
            echo "🔗 Commit: ${{ github.sha }}"
            echo "👤 Deployed by: ${{ github.actor }}"
            echo "=========================================="

            cd "$DEPLOY_PATH"
            echo "Using deploy path: $DEPLOY_PATH"

            # PHASE 1: PRE-DEPLOYMENT CHECK
            echo ""
            echo "🔍 PHASE 1: PRE-DEPLOYMENT CHECK"
            echo "=========================================="
            
            # Check current image version
            echo "📋 Current image before deploy:"
            docker images | grep backend || echo "No existing image found"
            
            # Check current container status
            echo "Current container status:"
            docker-compose -f docker-compose.prod.yml ps || echo "No running containers"

            # PHASE 1.5: CREATE ENVIRONMENT FILE
            echo ""
            echo "⚙️ PHASE 1.5: CREATING ENVIRONMENT FILE"
            echo "=========================================="
            cat > .env << 'EOF'
            DEPLOYMENT_TIMESTAMP=$(date)
            GIT_COMMIT=${{ github.sha }}
            DEPLOYED_BY=GitHub Actions

            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DATABASE_NAME=${{ secrets.DATABASE_NAME }}
            DATABASE_PORT=${{ secrets.DATABASE_PORT }}
            DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
            DATABASE_USER=${{ secrets.DATABASE_USER }}
            DATABASE_HOST=${{ secrets.DATABASE_HOST }}

            NODE_ENV=production
            PORT=3000
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}

            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN || '1d' }}
            JWT_REFRESH_EXPIRES_IN=${{ secrets.JWT_REFRESH_EXPIRES_IN || '30d' }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            ENCRYPTION_KEY_V2=${{ secrets.ENCRYPTION_KEY_V2 }}

            CLIENT_HOST=${{ secrets.CLIENT_HOST }}

            EMAIL_SMTP_SECURE=${{ secrets.EMAIL_SMTP_SECURE }}
            EMAIL_SMTP_USER=${{ secrets.EMAIL_SMTP_USER }}
            EMAIL_SMTP_PASS=${{ secrets.EMAIL_SMTP_PASS }}
            EMAIL_SMTP_PORT=${{ secrets.EMAIL_SMTP_PORT }}
            EMAIL_SMTP_HOST=${{ secrets.EMAIL_SMTP_HOST }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM }}
            EMAIL_SENDER_NAME=${{ secrets.EMAIL_SENDER_NAME }}

            PUSHER_APP_ID=${{ secrets.PUSHER_APP_ID }}
            PUSHER_KEY=${{ secrets.PUSHER_KEY }}
            PUSHER_SECRET=${{ secrets.PUSHER_SECRET }}
            PUSHER_CLUSTER=${{ secrets.PUSHER_CLUSTER }}

            R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}
            R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
            R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
            R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}
            R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}

            API_PUBLIC_URL=${{ secrets.API_PUBLIC_URL }}
            MEDIA_BASE_URL=${{ secrets.MEDIA_BASE_URL }}

            XENDIT_PAYMENT_SECRET_KEY=${{ secrets.XENDIT_PAYMENT_SECRET_KEY }}
            XENDIT_PAYOUT_SECRET_KEY=${{ secrets.XENDIT_PAYOUT_SECRET_KEY }}
            XENDIT_REPORT_SECRET_KEY=${{ secrets.XENDIT_REPORT_SECRET_KEY }}
            XENDIT_PUBLIC_KEY=${{ secrets.XENDIT_PUBLIC_KEY }}
            XENDIT_WEBHOOK_TOKEN=${{ secrets.XENDIT_WEBHOOK_TOKEN }}

            REDIS_URL=${{ secrets.REDIS_URL }}
            REDIS_ENABLED=${{ secrets.REDIS_ENABLED || 'false' }}
            REDIS_KEY_PREFIX=${{ secrets.REDIS_KEY_PREFIX || 'bisa:v1' }}
            REDIS_DEFAULT_TTL_SECONDS=${{ secrets.REDIS_DEFAULT_TTL_SECONDS || '3600' }}

            ML_SERVICE_URL=${{ secrets.ML_SERVICE_URL }}
            ML_PREDICT_ENABLED=${{ secrets.ML_PREDICT_ENABLED || 'true' }}
            LOG_LEVEL=${{ secrets.LOG_LEVEL || 'info' }}

            CHROMA_HOST=${{ secrets.CHROMA_HOST }}
            CHROMA_API_KEY=${{ secrets.CHROMA_API_KEY }}
            CHROMA_TENANT=${{ secrets.CHROMA_TENANT }}
            CHROMA_DATABASE=${{ secrets.CHROMA_DATABASE }}
            CHROMA_COLLECTION=${{ secrets.CHROMA_COLLECTION }}
            DEEPSHEEK_API_KEY=${{ secrets.DEEPSHEEK_API_KEY }}
            DEEPSHEEK_MODEL=${{ secrets.DEEPSHEEK_MODEL }}

            USER_ID_RAJA_ONGKIR=${{ secrets.USER_ID_RAJA_ONGKIR }}
            SECRET_KEY_RAJA_ONGKIR=${{ secrets.SECRET_KEY_RAJA_ONGKIR }}
            SHIPPING_COST_API_KEY=${{ secrets.SHIPPING_COST_API_KEY }}
            PAYMENT_API_KEY=${{ secrets.PAYMENT_API_KEY }}
            QRISLY_API_KEY=${{ secrets.QRISLY_API_KEY }}

            PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
            PIXABAY_API_KEY=${{ secrets.PIXABAY_API_KEY }}

            FIREBASE_SERVICE_ACCOUNT=${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
            FIREBASE_SERVICE_ACCOUNT_PATH=${{ secrets.FIREBASE_SERVICE_ACCOUNT_PATH }}

            READINESS_GATES_ENABLED=${{ secrets.READINESS_GATES_ENABLED || 'true' }}
            READINESS_ENFORCE_ADMIN=${{ secrets.READINESS_ENFORCE_ADMIN || 'false' }}
            REQUIRE_KYC_FOR_ACTIVE_PRODUCT=${{ secrets.REQUIRE_KYC_FOR_ACTIVE_PRODUCT || 'false' }}

            MEDIA_CHUNK_SIZE_BYTES=${{ secrets.MEDIA_CHUNK_SIZE_BYTES || '5242880' }}
            MEDIA_UPLOAD_SESSION_TTL_HOURS=${{ secrets.MEDIA_UPLOAD_SESSION_TTL_HOURS || '24' }}
            MEDIA_MAX_IMAGE_BYTES=${{ secrets.MEDIA_MAX_IMAGE_BYTES || '52428800' }}
            MEDIA_MAX_PDF_BYTES=${{ secrets.MEDIA_MAX_PDF_BYTES || '20971520' }}
            MEDIA_UPLOAD_PROXY_MODE=${{ secrets.MEDIA_UPLOAD_PROXY_MODE || 'true' }}

            PUBLIC_VERIFY_BASE_URL=${{ secrets.PUBLIC_VERIFY_BASE_URL }}
            SUPPORT_WHATSAPP=${{ secrets.SUPPORT_WHATSAPP }}
            SUPPORT_EMAIL=${{ secrets.SUPPORT_EMAIL }}

            RAJAONGKIR_BASE_URL=${{ secrets.RAJAONGKIR_BASE_URL }}
            RAJAONGKIR_DEFAULT_COURIERS=${{ secrets.RAJAONGKIR_DEFAULT_COURIERS }}
            RAG_ENABLED=${{ secrets.RAG_ENABLED || 'true' }}
            EOF
            chmod 600 .env
            echo "✅ .env file automatically created from GitHub Secrets!"

            # PHASE 2: PULL LATEST IMAGE
            echo ""
            echo "📦 PHASE 2: PULLING LATEST IMAGE"
            echo "=========================================="
            echo "⬇️ Pulling latest image..."
            docker-compose -f docker-compose.prod.yml pull
            
            echo "📋 New image version:"
            docker images | grep bisa | head -1

            # PHASE 3: RUN DATABASE MIGRATIONS (BEFORE CONTAINER RESTART)
            echo ""
            echo "🗄️ PHASE 3: DATABASE MIGRATIONS"
            echo "=========================================="
            
            # Start app container temporarily to run migrations
            echo "Starting app container for migrations..."
            docker-compose -f docker-compose.prod.yml up -d app
            
            # Wait for app to be ready with better diagnostics
            echo " Waiting for app to be ready (180 seconds)..."
            sleep 90

            # Health check before migration with container logs
            echo "Checking app health..."
            MAX_RETRIES=18
            RETRY_COUNT=0
            until docker exec bisa-app curl -f -s http://localhost:3000/ || [ $RETRY_COUNT -eq $MAX_RETRIES ]; do
              echo " App not ready, retrying... ($RETRY_COUNT/$MAX_RETRIES)"
              RETRY_COUNT=$((RETRY_COUNT+1))

              # Show last 20 lines of container logs for debugging
              echo " Container logs:"
              docker logs bisa-app --tail 20 || echo "Could not fetch logs"

              sleep 10
            done

            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo " App failed to start. Aborting deployment."
              echo ""
              echo "=== FULL CONTAINER LOGS ==="
              docker logs bisa-app || echo "Could not fetch full logs"
              echo "=== END LOGS ==="
              echo ""
              echo "=== CONTAINER STATUS ==="
              docker ps -a | grep bisa || echo "No containers found"
              echo "=== END STATUS ==="
              exit 1
            fi

            echo "App is ready!"

            # Run Prisma migrations
            echo "🗄️ Running Prisma migrations..."
            docker exec bisa-app npx prisma migrate deploy
            echo "✅ Database migrations successfully applied!"

            # Verify migration status
            echo "Migration status:"
            docker exec bisa-app npx prisma migrate status || echo "⚠️ Could not get migration status"

            # PHASE 4: RESTART APPLICATION WITH NEW IMAGE
            echo ""
            echo "PHASE 4: RESTARTING APPLICATION"
            echo "=========================================="

            # Stop all containers
            echo "Stopping all containers..."
            docker-compose -f docker-compose.prod.yml down

            # Start new containers
            echo "Starting new containers..."
            docker-compose -f docker-compose.prod.yml up -d

            # Wait for app to stabilize
            echo " Waiting for app to stabilize (60 seconds)..."
            sleep 60

            # PHASE 5: POST-DEPLOYMENT VERIFICATION
            echo ""
            echo "PHASE 5: POST-DEPLOYMENT VERIFICATION"
            echo "=========================================="

            # Show container status
            echo "Container status:"
            docker-compose -f docker-compose.prod.yml ps

            # Show recent logs
            echo "Recent logs (last 30 lines):"
            docker-compose -f docker-compose.prod.yml logs --tail=30 app

            # Health check with retry
            echo "Performing health check..."
            HEALTH_RETRY=0
            HEALTH_MAX=6
            until docker exec bisa-app curl -f -s http://localhost:3000/ || [ $HEALTH_RETRY -eq $HEALTH_MAX ]; do
              echo " Health check failed, retrying... ($HEALTH_RETRY/$HEALTH_MAX)"
              HEALTH_RETRY=$((HEALTH_RETRY+1))
              sleep 10
            done

            if [ $HEALTH_RETRY -eq $HEALTH_MAX ]; then
              echo " Health check failed after $HEALTH_MAX retries!"
              exit 1
            fi
            echo "Health check passed!"

            # Check PM2 status (if using PM2 inside container)
            echo "Application status:"
            docker exec bisa-app pm2 status || echo "PM2 not running or not installed"

            # PHASE 6: CLEANUP
            echo ""
            echo "PHASE 6: CLEANUP"
            echo "=========================================="
            echo "Cleaning up old images..."
            docker image prune -f

            echo ""
            echo "=========================================="
            echo "PRODUCTION DEPLOYMENT COMPLETED SUCCESSFULLY!"
            echo "=========================================="
            echo "Summary:"
            echo "  Image: Updated"
            echo "  Database: Migrated"
            echo "  Containers: Running"
            echo "  Health Check: Passed"
            echo "=========================================="

      - name: Notify deployment success
        if: success()
        run: |
          echo "🎉 Production deployment completed successfully!"
          echo "Database migrations: Applied"
          echo "Application: Running"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo " Production deployment FAILED!"
          echo "🔍 Please check the workflow logs for details"
          echo "🔗 Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"