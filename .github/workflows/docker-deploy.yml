name: Build and Deploy Docker Container

on:
  push:
    branches: ["main", "develop", "staging"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{date 'YYYYMMDD'}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-development:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: development
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/var/www/app/bisa-backend/b2b-bisa' }}

    steps:
      - name: Deploy to development server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST || secrets.DEVELOPMENT_HOST_IP }}
          username: ${{ secrets.DEPLOY_USER || secrets.DEVELOPMENT_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: DEPLOY_PATH
          script: |
            set -e
            echo "=========================================="
            echo "🚀 STARTING DEVELOPMENT DEPLOYMENT"
            echo "=========================================="
            echo "📅 Timestamp: $(date)"
            echo "🔗 Commit: ${{ github.sha }}"
            echo "=========================================="

            DEPLOY_PATH="${DEPLOY_PATH:-/var/www/app/bisa-backend/b2b-bisa}"
            cd "$DEPLOY_PATH"
            echo "Using deploy path: $DEPLOY_PATH"

            # Prefer standalone docker-compose (common on VPS); fall back to Compose V2 plugin.
            dc() {
              if command -v docker-compose >/dev/null 2>&1; then
                docker-compose "$@"
              elif docker compose version >/dev/null 2>&1; then
                docker compose "$@"
              else
                echo "ERROR: Docker Compose not found (install docker-compose or compose plugin)"
                docker version 2>/dev/null || true
                ls /usr/libexec/docker/cli-plugins 2>/dev/null || true
                exit 1
              fi
            }
            echo "Compose CLI:"
            dc version 2>/dev/null || dc --version
            # Ensure docker-compose file exists
            if [ ! -f docker-compose.prod.yml ]; then
              echo "Creating docker-compose.prod.yml..."
              cat > docker-compose.prod.yml << 'ComposeEOF'
            version: '3.8'
            
            services:
              app:
                image: ghcr.io/diyawandawan/b2b-bisa:latest
                pull_policy: always
                container_name: bisa-app
                ports:
                  - "$${APP_PORT:-3000}:3000"
                env_file:
                  - .env
                environment:
                  NODE_ENV: production
                  DATABASE_URL: $${DATABASE_URL}
                  PORT: $${PORT:-3000}
                  JWT_SECRET: $${JWT_SECRET}
                  JWT_EXPIRES_IN: $${JWT_EXPIRES_IN:-7d}
                  JWT_REFRESH_EXPIRES_IN: $${JWT_REFRESH_EXPIRES_IN:-30d}
                  ENCRYPTION_KEY: $${ENCRYPTION_KEY}
                  ENCRYPTION_KEY_V2: $${ENCRYPTION_KEY_V2:-}
                  CLIENT_HOST: $${CLIENT_HOST:-http://localhost:3000}
                  CORS_ORIGINS: $${CORS_ORIGINS:-http://localhost:3000}
                  REDIS_URL: $${REDIS_URL:-redis://redis:6379}
                  REDIS_ENABLED: $${REDIS_ENABLED:-true}
                  REDIS_HOST: $${REDIS_HOST:-redis}
                  REDIS_PORT: $${REDIS_PORT:-6379}
                  R2_ACCOUNT_ID: $${R2_ACCOUNT_ID}
                  R2_ACCESS_KEY_ID: $${R2_ACCESS_KEY_ID}
                  R2_SECRET_ACCESS_KEY: $${R2_SECRET_ACCESS_KEY}
                  R2_BUCKET_NAME: $${R2_BUCKET_NAME:-bisa}
                  R2_PUBLIC_URL: $${R2_PUBLIC_URL}
                  API_PUBLIC_URL: $${API_PUBLIC_URL}
                  MEDIA_BASE_URL: $${MEDIA_BASE_URL}
                  EMAIL_SMTP_HOST: $${EMAIL_SMTP_HOST}
                  EMAIL_SMTP_PORT: $${EMAIL_SMTP_PORT:-587}
                  EMAIL_SMTP_SECURE: $${EMAIL_SMTP_SECURE:-false}
                  EMAIL_SMTP_USER: $${EMAIL_SMTP_USER}
                  EMAIL_SMTP_PASS: $${EMAIL_SMTP_PASS}
                  EMAIL_FROM: $${EMAIL_FROM}
                  EMAIL_SENDER_NAME: $${EMAIL_SENDER_NAME:-BISA Platform}
                  XENDIT_PAYMENT_SECRET_KEY: $${XENDIT_PAYMENT_SECRET_KEY}
                  XENDIT_PAYOUT_SECRET_KEY: $${XENDIT_PAYOUT_SECRET_KEY}
                  XENDIT_REPORT_SECRET_KEY: $${XENDIT_REPORT_SECRET_KEY}
                  XENDIT_WEBHOOK_TOKEN: $${XENDIT_WEBHOOK_TOKEN}
                  XENDIT_PUBLIC_KEY: $${XENDIT_PUBLIC_KEY}
                  PUSHER_APP_ID: $${PUSHER_APP_ID}
                  PUSHER_KEY: $${PUSHER_KEY}
                  PUSHER_SECRET: $${PUSHER_SECRET}
                  PUSHER_CLUSTER: $${PUSHER_CLUSTER}
                extra_hosts:
                  - "host.docker.internal:host-gateway"
                depends_on:
                  - redis
                  - mysql
                restart: unless-stopped
                networks:
                  - bisa-network
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health"]
                  interval: 15s
                  timeout: 10s
                  retries: 5
                  start_period: 90s
                deploy:
                  resources:
                    limits:
                      memory: 512M
                      cpus: '0.5'
                  restart_policy:
                    condition: on-failure
                logging:
                  driver: "json-file"
                  options:
                    max-size: "10m"
                    max-file: "3"
            
              redis:
                image: redis:7-alpine
                container_name: backend-redis
                ports:
                  - "6379:6379"
                volumes:
                  - redis_data:/data
                restart: unless-stopped
                networks:
                  - bisa-network
              mysql:
                image: mysql:8.0
                container_name: bisa-mysql
                environment:
                  MYSQL_ROOT_PASSWORD: $${DATABASE_PASSWORD}
                  MYSQL_DATABASE: $${DATABASE_NAME}
                  MYSQL_USER: $${DATABASE_USER}
                  DATABASE_PASSWORD: $${DATABASE_PASSWORD}
                ports:
                  - "3306:3306"
                volumes:
                  - mysql_data:/var/lib/mysql
                networks:
                  - bisa-network
                restart: unless-stopped
                healthcheck:
                  test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
                  timeout: 20s
                  interval: 30s
                  retries: 3
            
            networks:
              bisa-network:
                driver: bridge
            
            volumes:
              redis_data:
              mysql_data:
            ComposeEOF
              echo "✅ docker-compose.prod.yml created"
            else
              echo "✅ docker-compose.prod.yml already exists"
            fi

            echo "Cleaning Docker disk before pull..."
            docker container prune -f || true
            docker builder prune -af || true
            docker image prune -af || true
            df -h / || true

            dc -f docker-compose.prod.yml pull || true
            dc -f docker-compose.prod.yml up -d app || true
            sleep 20
            docker exec backend-app npx prisma migrate deploy || echo "⚠️ Migration failed or no migrations pending"
            dc -f docker-compose.prod.yml down || true
            dc -f docker-compose.prod.yml up -d || true
            sleep 15
            docker exec backend-app curl -f http://localhost:3000/health || echo "⚠️ Health check failed"
            echo "Development deployment completed!"

      - name: Notify deployment status
        if: always()
        run: |
          echo "Development deployment status: ${{ job.status }}"

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/code-optimazed' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/var/www/app/bisa-backend/b2b-bisa' }}

    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST || secrets.STAGING_HOST_IP }}
          username: ${{ secrets.DEPLOY_USER || secrets.STAGING_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: DEPLOY_PATH
          script: |
            set -e  # Stop on error

            echo "=========================================="
            echo "🚀 STARTING STAGING DEPLOYMENT"
            echo "=========================================="
            echo "📅 Timestamp: $(date)"
            echo "🔗 Commit: ${{ github.sha }}"
            echo "👤 Deployed by: ${{ github.actor }}"
            echo "=========================================="

            DEPLOY_PATH="${DEPLOY_PATH:-/var/www/app/bisa-backend/b2b-bisa}"
            cd "$DEPLOY_PATH"
            echo "Using deploy path: $DEPLOY_PATH"

            # Prefer standalone docker-compose (common on VPS); fall back to Compose V2 plugin.
            dc() {
              if command -v docker-compose >/dev/null 2>&1; then
                docker-compose "$@"
              elif docker compose version >/dev/null 2>&1; then
                docker compose "$@"
              else
                echo "ERROR: Docker Compose not found (install docker-compose or compose plugin)"
                docker version 2>/dev/null || true
                ls /usr/libexec/docker/cli-plugins 2>/dev/null || true
                exit 1
              fi
            }
            echo "Compose CLI:"
            dc version 2>/dev/null || dc --version
            # Ensure docker-compose file exists
            if [ ! -f docker-compose.prod.yml ]; then
              echo "Creating docker-compose.prod.yml..."
              cat > docker-compose.prod.yml << 'ComposeEOF'
            version: '3.8'
            
            services:
              app:
                image: ghcr.io/diyawandawan/b2b-bisa:latest
                pull_policy: always
                container_name: bisa-app
                ports:
                  - "$${APP_PORT:-3000}:3000"
                env_file:
                  - .env
                environment:
                  NODE_ENV: production
                  DATABASE_URL: $${DATABASE_URL}
                  PORT: $${PORT:-3000}
                  JWT_SECRET: $${JWT_SECRET}
                  JWT_EXPIRES_IN: $${JWT_EXPIRES_IN:-7d}
                  JWT_REFRESH_EXPIRES_IN: $${JWT_REFRESH_EXPIRES_IN:-30d}
                  ENCRYPTION_KEY: $${ENCRYPTION_KEY}
                  ENCRYPTION_KEY_V2: $${ENCRYPTION_KEY_V2:-}
                  CLIENT_HOST: $${CLIENT_HOST:-http://localhost:3000}
                  CORS_ORIGINS: $${CORS_ORIGINS:-http://localhost:3000}
                  REDIS_URL: $${REDIS_URL:-redis://redis:6379}
                  REDIS_ENABLED: $${REDIS_ENABLED:-true}
                  REDIS_HOST: $${REDIS_HOST:-redis}
                  REDIS_PORT: $${REDIS_PORT:-6379}
                  R2_ACCOUNT_ID: $${R2_ACCOUNT_ID}
                  R2_ACCESS_KEY_ID: $${R2_ACCESS_KEY_ID}
                  R2_SECRET_ACCESS_KEY: $${R2_SECRET_ACCESS_KEY}
                  R2_BUCKET_NAME: $${R2_BUCKET_NAME:-bisa}
                  R2_PUBLIC_URL: $${R2_PUBLIC_URL}
                  API_PUBLIC_URL: $${API_PUBLIC_URL}
                  MEDIA_BASE_URL: $${MEDIA_BASE_URL}
                  EMAIL_SMTP_HOST: $${EMAIL_SMTP_HOST}
                  EMAIL_SMTP_PORT: $${EMAIL_SMTP_PORT:-587}
                  EMAIL_SMTP_SECURE: $${EMAIL_SMTP_SECURE:-false}
                  EMAIL_SMTP_USER: $${EMAIL_SMTP_USER}
                  EMAIL_SMTP_PASS: $${EMAIL_SMTP_PASS}
                  EMAIL_FROM: $${EMAIL_FROM}
                  EMAIL_SENDER_NAME: $${EMAIL_SENDER_NAME:-BISA Platform}
                  XENDIT_PAYMENT_SECRET_KEY: $${XENDIT_PAYMENT_SECRET_KEY}
                  XENDIT_PAYOUT_SECRET_KEY: $${XENDIT_PAYOUT_SECRET_KEY}
                  XENDIT_REPORT_SECRET_KEY: $${XENDIT_REPORT_SECRET_KEY}
                  XENDIT_WEBHOOK_TOKEN: $${XENDIT_WEBHOOK_TOKEN}
                  XENDIT_PUBLIC_KEY: $${XENDIT_PUBLIC_KEY}
                  PUSHER_APP_ID: $${PUSHER_APP_ID}
                  PUSHER_KEY: $${PUSHER_KEY}
                  PUSHER_SECRET: $${PUSHER_SECRET}
                  PUSHER_CLUSTER: $${PUSHER_CLUSTER}
                extra_hosts:
                  - "host.docker.internal:host-gateway"
                depends_on:
                  - redis
                  - mysql
                restart: unless-stopped
                networks:
                  - bisa-network
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health"]
                  interval: 15s
                  timeout: 10s
                  retries: 5
                  start_period: 90s
                deploy:
                  resources:
                    limits:
                      memory: 512M
                      cpus: '0.5'
                  restart_policy:
                    condition: on-failure
                logging:
                  driver: "json-file"
                  options:
                    max-size: "10m"
                    max-file: "3"
            
              redis:
                image: redis:7-alpine
                container_name: backend-redis
                ports:
                  - "6379:6379"
                volumes:
                  - redis_data:/data
                restart: unless-stopped
                networks:
                  - bisa-network
              mysql:
                image: mysql:8.0
                container_name: bisa-mysql
                environment:
                  MYSQL_ROOT_PASSWORD: $${DATABASE_PASSWORD}
                  MYSQL_DATABASE: $${DATABASE_NAME}
                  MYSQL_USER: $${DATABASE_USER}
                  DATABASE_PASSWORD: $${DATABASE_PASSWORD}
                ports:
                  - "3306:3306"
                volumes:
                  - mysql_data:/var/lib/mysql
                networks:
                  - bisa-network
                restart: unless-stopped
                healthcheck:
                  test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
                  timeout: 20s
                  interval: 30s
                  retries: 3
            
            networks:
              bisa-network:
                driver: bridge
            
            volumes:
              redis_data:
              mysql_data:
            ComposeEOF
              echo "✅ docker-compose.prod.yml created"
            else
              echo "✅ docker-compose.prod.yml already exists"
            fi

            # PHASE 1: PRE-DEPLOYMENT CHECK
            echo ""
            echo "🔍 PHASE 1: PRE-DEPLOYMENT CHECK"
            echo "=========================================="
            
            # Check current image version
            echo "📋 Current image before deploy:"
            docker images | grep backend || echo "No existing image found"
            
            # Check current container status
            echo "Current container status:"
            dc -f docker-compose.prod.yml ps || echo "No running containers"

            # PHASE 1.5: CREATE ENVIRONMENT FILE
            echo ""
            echo "⚙️ PHASE 1.5: CREATING ENVIRONMENT FILE"
            echo "=========================================="
            sed 's/^            //' > .env << 'ENVEOF'
                        DEPLOYMENT_TIMESTAMP=$(date)
                        GIT_COMMIT=${{ github.sha }}
                        DEPLOYED_BY=GitHub Actions
            
                        DATABASE_URL=${{ secrets.DATABASE_URL }}
                        DATABASE_NAME=${{ secrets.DATABASE_NAME }}
                        DATABASE_PORT=${{ secrets.DATABASE_PORT }}
                        DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
                        DATABASE_USER=${{ secrets.DATABASE_USER }}
                        DATABASE_HOST=${{ secrets.DATABASE_HOST }}
            
                        NODE_ENV=production
                        PORT=3000
                        CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            
                        JWT_SECRET=${{ secrets.JWT_SECRET }}
                        JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN || '1d' }}
                        JWT_REFRESH_EXPIRES_IN=${{ secrets.JWT_REFRESH_EXPIRES_IN || '30d' }}
                        ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
                        ENCRYPTION_KEY_V2=${{ secrets.ENCRYPTION_KEY_V2 }}
            
                        CLIENT_HOST=${{ secrets.CLIENT_HOST }}
            
                        EMAIL_SMTP_SECURE=${{ secrets.EMAIL_SMTP_SECURE }}
                        EMAIL_SMTP_USER=${{ secrets.EMAIL_SMTP_USER }}
                        EMAIL_SMTP_PASS=${{ secrets.EMAIL_SMTP_PASS }}
                        EMAIL_SMTP_PORT=${{ secrets.EMAIL_SMTP_PORT }}
                        EMAIL_SMTP_HOST=${{ secrets.EMAIL_SMTP_HOST }}
                        EMAIL_FROM=${{ secrets.EMAIL_FROM }}
                        EMAIL_SENDER_NAME=${{ secrets.EMAIL_SENDER_NAME }}
            
                        PUSHER_APP_ID=${{ secrets.PUSHER_APP_ID }}
                        PUSHER_KEY=${{ secrets.PUSHER_KEY }}
                        PUSHER_SECRET=${{ secrets.PUSHER_SECRET }}
                        PUSHER_CLUSTER=${{ secrets.PUSHER_CLUSTER }}
            
                        R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}
                        R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
                        R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
                        R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}
                        R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}
            
                        API_PUBLIC_URL=${{ secrets.API_PUBLIC_URL }}
                        MEDIA_BASE_URL=${{ secrets.MEDIA_BASE_URL }}
            
                        XENDIT_PAYMENT_SECRET_KEY=${{ secrets.XENDIT_PAYMENT_SECRET_KEY }}
                        XENDIT_PAYOUT_SECRET_KEY=${{ secrets.XENDIT_PAYOUT_SECRET_KEY }}
                        XENDIT_REPORT_SECRET_KEY=${{ secrets.XENDIT_REPORT_SECRET_KEY }}
                        XENDIT_PUBLIC_KEY=${{ secrets.XENDIT_PUBLIC_KEY }}
                        XENDIT_WEBHOOK_TOKEN=${{ secrets.XENDIT_WEBHOOK_TOKEN }}
            
                        REDIS_URL=${{ secrets.REDIS_URL }}
                        REDIS_ENABLED=${{ secrets.REDIS_ENABLED || 'false' }}
                        REDIS_KEY_PREFIX=${{ secrets.REDIS_KEY_PREFIX || 'bisa:v1' }}
                        REDIS_DEFAULT_TTL_SECONDS=${{ secrets.REDIS_DEFAULT_TTL_SECONDS || '3600' }}
            
                        ML_SERVICE_URL=${{ secrets.ML_SERVICE_URL }}
                        ML_PREDICT_ENABLED=${{ secrets.ML_PREDICT_ENABLED || 'true' }}
                        LOG_LEVEL=${{ secrets.LOG_LEVEL || 'info' }}
            
                        CHROMA_HOST=${{ secrets.CHROMA_HOST }}
                        CHROMA_API_KEY=${{ secrets.CHROMA_API_KEY }}
                        CHROMA_TENANT=${{ secrets.CHROMA_TENANT }}
                        CHROMA_DATABASE=${{ secrets.CHROMA_DATABASE }}
                        CHROMA_COLLECTION=${{ secrets.CHROMA_COLLECTION }}
                        DEEPSHEEK_API_KEY=${{ secrets.DEEPSHEEK_API_KEY }}
                        DEEPSHEEK_MODEL=${{ secrets.DEEPSHEEK_MODEL }}
            
                        USER_ID_RAJA_ONGKIR=${{ secrets.USER_ID_RAJA_ONGKIR }}
                        SECRET_KEY_RAJA_ONGKIR=${{ secrets.SECRET_KEY_RAJA_ONGKIR }}
                        SHIPPING_COST_API_KEY=${{ secrets.SHIPPING_COST_API_KEY }}
                        PAYMENT_API_KEY=${{ secrets.PAYMENT_API_KEY }}
                        QRISLY_API_KEY=${{ secrets.QRISLY_API_KEY }}
            
                        PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
                        PIXABAY_API_KEY=${{ secrets.PIXABAY_API_KEY }}
            
                        FIREBASE_SERVICE_ACCOUNT=${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
                        FIREBASE_SERVICE_ACCOUNT_PATH=${{ secrets.FIREBASE_SERVICE_ACCOUNT_PATH }}
            
                        READINESS_GATES_ENABLED=${{ secrets.READINESS_GATES_ENABLED || 'true' }}
                        READINESS_ENFORCE_ADMIN=${{ secrets.READINESS_ENFORCE_ADMIN || 'false' }}
                        REQUIRE_KYC_FOR_ACTIVE_PRODUCT=${{ secrets.REQUIRE_KYC_FOR_ACTIVE_PRODUCT || 'false' }}
            
                        MEDIA_CHUNK_SIZE_BYTES=${{ secrets.MEDIA_CHUNK_SIZE_BYTES || '5242880' }}
                        MEDIA_UPLOAD_SESSION_TTL_HOURS=${{ secrets.MEDIA_UPLOAD_SESSION_TTL_HOURS || '24' }}
                        MEDIA_MAX_IMAGE_BYTES=${{ secrets.MEDIA_MAX_IMAGE_BYTES || '52428800' }}
                        MEDIA_MAX_PDF_BYTES=${{ secrets.MEDIA_MAX_PDF_BYTES || '20971520' }}
                        MEDIA_UPLOAD_PROXY_MODE=${{ secrets.MEDIA_UPLOAD_PROXY_MODE || 'true' }}
            
                        PUBLIC_VERIFY_BASE_URL=${{ secrets.PUBLIC_VERIFY_BASE_URL }}
                        SUPPORT_WHATSAPP=${{ secrets.SUPPORT_WHATSAPP }}
                        SUPPORT_EMAIL=${{ secrets.SUPPORT_EMAIL }}
            
                        RAJAONGKIR_BASE_URL=${{ secrets.RAJAONGKIR_BASE_URL }}
                        RAJAONGKIR_DEFAULT_COURIERS=${{ secrets.RAJAONGKIR_DEFAULT_COURIERS }}
                        RAG_ENABLED=${{ secrets.RAG_ENABLED || 'true' }}
            ENVEOF
            chmod 600 .env
            echo "✅ .env file automatically created from GitHub Secrets!"

            # PHASE 2: FREE DISK + PULL LATEST IMAGE
            echo ""
            echo "🧹 PHASE 2a: FREE DISK SPACE"
            echo "=========================================="
            df -h / || true
            docker system df || true
            docker container prune -f || true
            docker builder prune -af || true
            # Hapus image BISA lama (yang tidak dipakai container running) agar ada ruang untuk pull.
            docker images "ghcr.io/diyawandawan/b2b-bisa" --format "{{.ID}} {{.Repository}}:{{.Tag}}" || true
            docker image prune -af || true
            # Bersihkan log journal & apt cache di host (aman)
            sudo journalctl --vacuum-size=100M 2>/dev/null || journalctl --vacuum-size=100M 2>/dev/null || true
            sudo apt-get clean 2>/dev/null || true
            echo "Disk after cleanup:"
            df -h / || true
            AVAIL_KB=$(df -Pk / | awk 'NR==2 {print $4}')
            if [ -n "$AVAIL_KB" ] && [ "$AVAIL_KB" -lt 2097152 ]; then
              echo "ERROR: less than 2GiB free on /. Free disk on the VPS before deploy."
              echo "Hint: docker images; docker rmi <old-ids>; du -xh /var/lib/docker | sort -h | tail"
              exit 1
            fi

            echo ""
            echo "📦 PHASE 2b: PULLING LATEST IMAGE"
            echo "=========================================="
            echo "⬇️ Pulling latest image..."
            dc -f docker-compose.prod.yml pull
            
            echo "📋 New image version:"
            docker images | grep bisa | head -1

            # PHASE 3: RUN DATABASE MIGRATIONS (BEFORE CONTAINER RESTART)
            echo ""
            echo "🗄️ PHASE 3: DATABASE MIGRATIONS"
            echo "=========================================="

            # Remove stale containers left by older compose runs before recreate
            echo "Cleaning stale containers..."
            docker rm -f bisa-mysql bisa-app backend-redis 2>/dev/null || true
            docker ps -aq --filter "name=-mysql" | xargs -r docker rm -f 2>/dev/null || true
            
            # Start app container temporarily to run migrations
            echo "Starting app container for migrations..."
            dc -f docker-compose.prod.yml up -d app
            
            # Wait for app to be ready with better diagnostics
            echo " Waiting for app to be ready (180 seconds)..."
            sleep 90

            # Health check before migration with container logs
            echo "Checking app health..."
            MAX_RETRIES=18
            RETRY_COUNT=0
            until docker exec bisa-app curl -f -s http://localhost:3000/ || [ $RETRY_COUNT -eq $MAX_RETRIES ]; do
              echo " App not ready, retrying... ($RETRY_COUNT/$MAX_RETRIES)"
              RETRY_COUNT=$((RETRY_COUNT+1))

              # Show last 20 lines of container logs for debugging
              echo " Container logs:"
              docker logs bisa-app --tail 20 || echo "Could not fetch logs"

              sleep 10
            done

            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo " App failed to start. Aborting deployment."
              echo ""
              echo "=== FULL CONTAINER LOGS ==="
              docker logs bisa-app || echo "Could not fetch full logs"
              echo "=== END LOGS ==="
              echo ""
              echo "=== CONTAINER STATUS ==="
              docker ps -a | grep bisa || echo "No containers found"
              echo "=== END STATUS ==="
              exit 1
            fi

            echo "App is ready!"

            # Run Prisma migrations
            echo "🗄️ Running Prisma migrations..."
            docker exec bisa-app npx prisma migrate deploy
            echo "✅ Database migrations successfully applied!"

            # Verify migration status
            echo "Migration status:"
            docker exec bisa-app npx prisma migrate status || echo "⚠️ Could not get migration status"

            # PHASE 4: RESTART APPLICATION WITH NEW IMAGE
            echo ""
            echo "PHASE 4: RESTARTING APPLICATION"
            echo "=========================================="

            # Stop all containers
            echo "Stopping all containers..."
            dc -f docker-compose.prod.yml down

            # Start new containers
            echo "Starting new containers..."
            dc -f docker-compose.prod.yml up -d

            # Wait for app to stabilize
            echo " Waiting for app to stabilize (60 seconds)..."
            sleep 60

            # PHASE 5: POST-DEPLOYMENT VERIFICATION
            echo ""
            echo "PHASE 5: POST-DEPLOYMENT VERIFICATION"
            echo "=========================================="

            # Show container status
            echo "Container status:"
            dc -f docker-compose.prod.yml ps

            # Show recent logs
            echo "Recent logs (last 30 lines):"
            dc -f docker-compose.prod.yml logs --tail=30 app

            # Health check with retry
            echo "Performing health check..."
            HEALTH_RETRY=0
            HEALTH_MAX=6
            until docker exec bisa-app curl -f -s http://localhost:3000/ || [ $HEALTH_RETRY -eq $HEALTH_MAX ]; do
              echo " Health check failed, retrying... ($HEALTH_RETRY/$HEALTH_MAX)"
              HEALTH_RETRY=$((HEALTH_RETRY+1))
              sleep 10
            done

            if [ $HEALTH_RETRY -eq $HEALTH_MAX ]; then
              echo " Health check failed after $HEALTH_MAX retries!"
              exit 1
            fi
            echo "Health check passed!"

            # Check PM2 status (if using PM2 inside container)
            echo "Application status:"
            docker exec bisa-app pm2 status || echo "PM2 not running or not installed"

            # PHASE 6: CLEANUP
            echo ""
            echo "PHASE 6: CLEANUP"
            echo "=========================================="
            echo "Cleaning up old images..."
            docker image prune -f

            echo ""
            echo "=========================================="
            echo "STAGING DEPLOYMENT COMPLETED SUCCESSFULLY!"
            echo "=========================================="
            echo "Summary:"
            echo "  Image: Updated"
            echo "  Database: Migrated"
            echo "  Containers: Running"
            echo "  Health Check: Passed"
            echo "=========================================="

      - name: Notify deployment success
        if: success()
        run: |
          echo "🎉 Staging deployment completed successfully!"
          echo "Database migrations: Applied"
          echo "Application: Running"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo " Staging deployment FAILED!"
          echo "🔍 Please check the workflow logs for details"
          echo "🔗 Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/var/www/app/bisa-backend/b2b-bisa' }}

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST || secrets.HOST }}
          username: ${{ secrets.DEPLOY_USER || secrets.USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: DEPLOY_PATH
          script: |
            set -e  # Stop on error

            echo "=========================================="
            echo "🚀 STARTING PRODUCTION DEPLOYMENT"
            echo "=========================================="
            echo "📅 Timestamp: $(date)"
            echo "🔗 Commit: ${{ github.sha }}"
            echo "👤 Deployed by: ${{ github.actor }}"
            echo "=========================================="

            DEPLOY_PATH="${DEPLOY_PATH:-/var/www/app/bisa-backend/b2b-bisa}"
            cd "$DEPLOY_PATH"
            echo "Using deploy path: $DEPLOY_PATH"

            # Prefer standalone docker-compose (common on VPS); fall back to Compose V2 plugin.
            dc() {
              if command -v docker-compose >/dev/null 2>&1; then
                docker-compose "$@"
              elif docker compose version >/dev/null 2>&1; then
                docker compose "$@"
              else
                echo "ERROR: Docker Compose not found (install docker-compose or compose plugin)"
                docker version 2>/dev/null || true
                ls /usr/libexec/docker/cli-plugins 2>/dev/null || true
                exit 1
              fi
            }
            echo "Compose CLI:"
            dc version 2>/dev/null || dc --version
            # Ensure docker-compose file exists
            if [ ! -f docker-compose.prod.yml ]; then
              echo "Creating docker-compose.prod.yml..."
              cat > docker-compose.prod.yml << 'ComposeEOF'
            version: '3.8'
            
            services:
              app:
                image: ghcr.io/diyawandawan/b2b-bisa:latest
                pull_policy: always
                container_name: bisa-app
                ports:
                  - "$${APP_PORT:-3000}:3000"
                env_file:
                  - .env
                environment:
                  NODE_ENV: production
                  DATABASE_URL: $${DATABASE_URL}
                  PORT: $${PORT:-3000}
                  JWT_SECRET: $${JWT_SECRET}
                  JWT_EXPIRES_IN: $${JWT_EXPIRES_IN:-7d}
                  JWT_REFRESH_EXPIRES_IN: $${JWT_REFRESH_EXPIRES_IN:-30d}
                  ENCRYPTION_KEY: $${ENCRYPTION_KEY}
                  ENCRYPTION_KEY_V2: $${ENCRYPTION_KEY_V2:-}
                  CLIENT_HOST: $${CLIENT_HOST:-http://localhost:3000}
                  CORS_ORIGINS: $${CORS_ORIGINS:-http://localhost:3000}
                  REDIS_URL: $${REDIS_URL:-redis://redis:6379}
                  REDIS_ENABLED: $${REDIS_ENABLED:-true}
                  REDIS_HOST: $${REDIS_HOST:-redis}
                  REDIS_PORT: $${REDIS_PORT:-6379}
                  R2_ACCOUNT_ID: $${R2_ACCOUNT_ID}
                  R2_ACCESS_KEY_ID: $${R2_ACCESS_KEY_ID}
                  R2_SECRET_ACCESS_KEY: $${R2_SECRET_ACCESS_KEY}
                  R2_BUCKET_NAME: $${R2_BUCKET_NAME:-bisa}
                  R2_PUBLIC_URL: $${R2_PUBLIC_URL}
                  API_PUBLIC_URL: $${API_PUBLIC_URL}
                  MEDIA_BASE_URL: $${MEDIA_BASE_URL}
                  EMAIL_SMTP_HOST: $${EMAIL_SMTP_HOST}
                  EMAIL_SMTP_PORT: $${EMAIL_SMTP_PORT:-587}
                  EMAIL_SMTP_SECURE: $${EMAIL_SMTP_SECURE:-false}
                  EMAIL_SMTP_USER: $${EMAIL_SMTP_USER}
                  EMAIL_SMTP_PASS: $${EMAIL_SMTP_PASS}
                  EMAIL_FROM: $${EMAIL_FROM}
                  EMAIL_SENDER_NAME: $${EMAIL_SENDER_NAME:-BISA Platform}
                  XENDIT_PAYMENT_SECRET_KEY: $${XENDIT_PAYMENT_SECRET_KEY}
                  XENDIT_PAYOUT_SECRET_KEY: $${XENDIT_PAYOUT_SECRET_KEY}
                  XENDIT_REPORT_SECRET_KEY: $${XENDIT_REPORT_SECRET_KEY}
                  XENDIT_WEBHOOK_TOKEN: $${XENDIT_WEBHOOK_TOKEN}
                  XENDIT_PUBLIC_KEY: $${XENDIT_PUBLIC_KEY}
                  PUSHER_APP_ID: $${PUSHER_APP_ID}
                  PUSHER_KEY: $${PUSHER_KEY}
                  PUSHER_SECRET: $${PUSHER_SECRET}
                  PUSHER_CLUSTER: $${PUSHER_CLUSTER}
                extra_hosts:
                  - "host.docker.internal:host-gateway"
                depends_on:
                  - redis
                  - mysql
                restart: unless-stopped
                networks:
                  - bisa-network
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health"]
                  interval: 15s
                  timeout: 10s
                  retries: 5
                  start_period: 90s
                deploy:
                  resources:
                    limits:
                      memory: 512M
                      cpus: '0.5'
                  restart_policy:
                    condition: on-failure
                logging:
                  driver: "json-file"
                  options:
                    max-size: "10m"
                    max-file: "3"
            
              redis:
                image: redis:7-alpine
                container_name: backend-redis
                ports:
                  - "6379:6379"
                volumes:
                  - redis_data:/data
                restart: unless-stopped
                networks:
                  - bisa-network
              mysql:
                image: mysql:8.0
                container_name: bisa-mysql
                environment:
                  MYSQL_ROOT_PASSWORD: $${DATABASE_PASSWORD}
                  MYSQL_DATABASE: $${DATABASE_NAME}
                  MYSQL_USER: $${DATABASE_USER}
                  DATABASE_PASSWORD: $${DATABASE_PASSWORD}
                ports:
                  - "3306:3306"
                volumes:
                  - mysql_data:/var/lib/mysql
                networks:
                  - bisa-network
                restart: unless-stopped
                healthcheck:
                  test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
                  timeout: 20s
                  interval: 30s
                  retries: 3
            
            networks:
              bisa-network:
                driver: bridge
            
            volumes:
              redis_data:
              mysql_data:
            ComposeEOF
              echo "✅ docker-compose.prod.yml created"
            else
              echo "✅ docker-compose.prod.yml already exists"
            fi

            # PHASE 1: PRE-DEPLOYMENT CHECK
            echo ""
            echo "🔍 PHASE 1: PRE-DEPLOYMENT CHECK"
            echo "=========================================="
            
            # Check current image version
            echo "📋 Current image before deploy:"
            docker images | grep backend || echo "No existing image found"
            
            # Check current container status
            echo "Current container status:"
            dc -f docker-compose.prod.yml ps || echo "No running containers"

            # PHASE 1.5: CREATE ENVIRONMENT FILE
            echo ""
            echo "⚙️ PHASE 1.5: CREATING ENVIRONMENT FILE"
            echo "=========================================="
            sed 's/^            //' > .env << 'ENVEOF'
                        DEPLOYMENT_TIMESTAMP=$(date)
                        GIT_COMMIT=${{ github.sha }}
                        DEPLOYED_BY=GitHub Actions
            
                        DATABASE_URL=${{ secrets.DATABASE_URL }}
                        DATABASE_NAME=${{ secrets.DATABASE_NAME }}
                        DATABASE_PORT=${{ secrets.DATABASE_PORT }}
                        DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
                        DATABASE_USER=${{ secrets.DATABASE_USER }}
                        DATABASE_HOST=${{ secrets.DATABASE_HOST }}
            
                        NODE_ENV=production
                        PORT=3000
                        CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            
                        JWT_SECRET=${{ secrets.JWT_SECRET }}
                        JWT_EXPIRES_IN=${{ secrets.JWT_EXPIRES_IN || '1d' }}
                        JWT_REFRESH_EXPIRES_IN=${{ secrets.JWT_REFRESH_EXPIRES_IN || '30d' }}
                        ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
                        ENCRYPTION_KEY_V2=${{ secrets.ENCRYPTION_KEY_V2 }}
            
                        CLIENT_HOST=${{ secrets.CLIENT_HOST }}
            
                        EMAIL_SMTP_SECURE=${{ secrets.EMAIL_SMTP_SECURE }}
                        EMAIL_SMTP_USER=${{ secrets.EMAIL_SMTP_USER }}
                        EMAIL_SMTP_PASS=${{ secrets.EMAIL_SMTP_PASS }}
                        EMAIL_SMTP_PORT=${{ secrets.EMAIL_SMTP_PORT }}
                        EMAIL_SMTP_HOST=${{ secrets.EMAIL_SMTP_HOST }}
                        EMAIL_FROM=${{ secrets.EMAIL_FROM }}
                        EMAIL_SENDER_NAME=${{ secrets.EMAIL_SENDER_NAME }}
            
                        PUSHER_APP_ID=${{ secrets.PUSHER_APP_ID }}
                        PUSHER_KEY=${{ secrets.PUSHER_KEY }}
                        PUSHER_SECRET=${{ secrets.PUSHER_SECRET }}
                        PUSHER_CLUSTER=${{ secrets.PUSHER_CLUSTER }}
            
                        R2_ACCOUNT_ID=${{ secrets.R2_ACCOUNT_ID }}
                        R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
                        R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
                        R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}
                        R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}
            
                        API_PUBLIC_URL=${{ secrets.API_PUBLIC_URL }}
                        MEDIA_BASE_URL=${{ secrets.MEDIA_BASE_URL }}
            
                        XENDIT_PAYMENT_SECRET_KEY=${{ secrets.XENDIT_PAYMENT_SECRET_KEY }}
                        XENDIT_PAYOUT_SECRET_KEY=${{ secrets.XENDIT_PAYOUT_SECRET_KEY }}
                        XENDIT_REPORT_SECRET_KEY=${{ secrets.XENDIT_REPORT_SECRET_KEY }}
                        XENDIT_PUBLIC_KEY=${{ secrets.XENDIT_PUBLIC_KEY }}
                        XENDIT_WEBHOOK_TOKEN=${{ secrets.XENDIT_WEBHOOK_TOKEN }}
            
                        REDIS_URL=${{ secrets.REDIS_URL }}
                        REDIS_ENABLED=${{ secrets.REDIS_ENABLED || 'false' }}
                        REDIS_KEY_PREFIX=${{ secrets.REDIS_KEY_PREFIX || 'bisa:v1' }}
                        REDIS_DEFAULT_TTL_SECONDS=${{ secrets.REDIS_DEFAULT_TTL_SECONDS || '3600' }}
            
                        ML_SERVICE_URL=${{ secrets.ML_SERVICE_URL }}
                        ML_PREDICT_ENABLED=${{ secrets.ML_PREDICT_ENABLED || 'true' }}
                        LOG_LEVEL=${{ secrets.LOG_LEVEL || 'info' }}
            
                        CHROMA_HOST=${{ secrets.CHROMA_HOST }}
                        CHROMA_API_KEY=${{ secrets.CHROMA_API_KEY }}
                        CHROMA_TENANT=${{ secrets.CHROMA_TENANT }}
                        CHROMA_DATABASE=${{ secrets.CHROMA_DATABASE }}
                        CHROMA_COLLECTION=${{ secrets.CHROMA_COLLECTION }}
                        DEEPSHEEK_API_KEY=${{ secrets.DEEPSHEEK_API_KEY }}
                        DEEPSHEEK_MODEL=${{ secrets.DEEPSHEEK_MODEL }}
            
                        USER_ID_RAJA_ONGKIR=${{ secrets.USER_ID_RAJA_ONGKIR }}
                        SECRET_KEY_RAJA_ONGKIR=${{ secrets.SECRET_KEY_RAJA_ONGKIR }}
                        SHIPPING_COST_API_KEY=${{ secrets.SHIPPING_COST_API_KEY }}
                        PAYMENT_API_KEY=${{ secrets.PAYMENT_API_KEY }}
                        QRISLY_API_KEY=${{ secrets.QRISLY_API_KEY }}
            
                        PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
                        PIXABAY_API_KEY=${{ secrets.PIXABAY_API_KEY }}
            
                        FIREBASE_SERVICE_ACCOUNT=${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
                        FIREBASE_SERVICE_ACCOUNT_PATH=${{ secrets.FIREBASE_SERVICE_ACCOUNT_PATH }}
            
                        READINESS_GATES_ENABLED=${{ secrets.READINESS_GATES_ENABLED || 'true' }}
                        READINESS_ENFORCE_ADMIN=${{ secrets.READINESS_ENFORCE_ADMIN || 'false' }}
                        REQUIRE_KYC_FOR_ACTIVE_PRODUCT=${{ secrets.REQUIRE_KYC_FOR_ACTIVE_PRODUCT || 'false' }}
            
                        MEDIA_CHUNK_SIZE_BYTES=${{ secrets.MEDIA_CHUNK_SIZE_BYTES || '5242880' }}
                        MEDIA_UPLOAD_SESSION_TTL_HOURS=${{ secrets.MEDIA_UPLOAD_SESSION_TTL_HOURS || '24' }}
                        MEDIA_MAX_IMAGE_BYTES=${{ secrets.MEDIA_MAX_IMAGE_BYTES || '52428800' }}
                        MEDIA_MAX_PDF_BYTES=${{ secrets.MEDIA_MAX_PDF_BYTES || '20971520' }}
                        MEDIA_UPLOAD_PROXY_MODE=${{ secrets.MEDIA_UPLOAD_PROXY_MODE || 'true' }}
            
                        PUBLIC_VERIFY_BASE_URL=${{ secrets.PUBLIC_VERIFY_BASE_URL }}
                        SUPPORT_WHATSAPP=${{ secrets.SUPPORT_WHATSAPP }}
                        SUPPORT_EMAIL=${{ secrets.SUPPORT_EMAIL }}
            
                        RAJAONGKIR_BASE_URL=${{ secrets.RAJAONGKIR_BASE_URL }}
                        RAJAONGKIR_DEFAULT_COURIERS=${{ secrets.RAJAONGKIR_DEFAULT_COURIERS }}
                        RAG_ENABLED=${{ secrets.RAG_ENABLED || 'true' }}
            ENVEOF
            chmod 600 .env
            echo "✅ .env file automatically created from GitHub Secrets!"

            # PHASE 2: FREE DISK + PULL LATEST IMAGE
            echo ""
            echo "🧹 PHASE 2a: FREE DISK SPACE"
            echo "=========================================="
            df -h / || true
            docker system df || true
            docker container prune -f || true
            docker builder prune -af || true
            # Hapus image BISA lama (yang tidak dipakai container running) agar ada ruang untuk pull.
            docker images "ghcr.io/diyawandawan/b2b-bisa" --format "{{.ID}} {{.Repository}}:{{.Tag}}" || true
            docker image prune -af || true
            # Bersihkan log journal & apt cache di host (aman)
            sudo journalctl --vacuum-size=100M 2>/dev/null || journalctl --vacuum-size=100M 2>/dev/null || true
            sudo apt-get clean 2>/dev/null || true
            echo "Disk after cleanup:"
            df -h / || true
            AVAIL_KB=$(df -Pk / | awk 'NR==2 {print $4}')
            if [ -n "$AVAIL_KB" ] && [ "$AVAIL_KB" -lt 2097152 ]; then
              echo "ERROR: less than 2GiB free on /. Free disk on the VPS before deploy."
              echo "Hint: docker images; docker rmi <old-ids>; du -xh /var/lib/docker | sort -h | tail"
              exit 1
            fi

            echo ""
            echo "📦 PHASE 2b: PULLING LATEST IMAGE"
            echo "=========================================="
            echo "⬇️ Pulling latest image..."
            dc -f docker-compose.prod.yml pull
            
            echo "📋 New image version:"
            docker images | grep bisa | head -1

            # PHASE 3: RUN DATABASE MIGRATIONS (BEFORE CONTAINER RESTART)
            echo ""
            echo "🗄️ PHASE 3: DATABASE MIGRATIONS"
            echo "=========================================="

            # Remove stale containers left by older compose runs before recreate
            echo "Cleaning stale containers..."
            docker rm -f bisa-mysql bisa-app backend-redis 2>/dev/null || true
            docker ps -aq --filter "name=-mysql" | xargs -r docker rm -f 2>/dev/null || true
            
            # Start app container temporarily to run migrations
            echo "Starting app container for migrations..."
            dc -f docker-compose.prod.yml up -d app
            
            # Wait for app to be ready with better diagnostics
            echo " Waiting for app to be ready (180 seconds)..."
            sleep 90

            # Health check before migration with container logs
            echo "Checking app health..."
            MAX_RETRIES=18
            RETRY_COUNT=0
            until docker exec bisa-app curl -f -s http://localhost:3000/ || [ $RETRY_COUNT -eq $MAX_RETRIES ]; do
              echo " App not ready, retrying... ($RETRY_COUNT/$MAX_RETRIES)"
              RETRY_COUNT=$((RETRY_COUNT+1))

              # Show last 20 lines of container logs for debugging
              echo " Container logs:"
              docker logs bisa-app --tail 20 || echo "Could not fetch logs"

              sleep 10
            done

            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo " App failed to start. Aborting deployment."
              echo ""
              echo "=== FULL CONTAINER LOGS ==="
              docker logs bisa-app || echo "Could not fetch full logs"
              echo "=== END LOGS ==="
              echo ""
              echo "=== CONTAINER STATUS ==="
              docker ps -a | grep bisa || echo "No containers found"
              echo "=== END STATUS ==="
              exit 1
            fi

            echo "App is ready!"

            # Run Prisma migrations
            echo "🗄️ Running Prisma migrations..."
            docker exec bisa-app npx prisma migrate deploy
            echo "✅ Database migrations successfully applied!"

            # Verify migration status
            echo "Migration status:"
            docker exec bisa-app npx prisma migrate status || echo "⚠️ Could not get migration status"

            # PHASE 4: RESTART APPLICATION WITH NEW IMAGE
            echo ""
            echo "PHASE 4: RESTARTING APPLICATION"
            echo "=========================================="

            # Stop all containers
            echo "Stopping all containers..."
            dc -f docker-compose.prod.yml down

            # Start new containers
            echo "Starting new containers..."
            dc -f docker-compose.prod.yml up -d

            # Wait for app to stabilize
            echo " Waiting for app to stabilize (60 seconds)..."
            sleep 60

            # PHASE 5: POST-DEPLOYMENT VERIFICATION
            echo ""
            echo "PHASE 5: POST-DEPLOYMENT VERIFICATION"
            echo "=========================================="

            # Show container status
            echo "Container status:"
            dc -f docker-compose.prod.yml ps

            # Show recent logs
            echo "Recent logs (last 30 lines):"
            dc -f docker-compose.prod.yml logs --tail=30 app

            # Health check with retry
            echo "Performing health check..."
            HEALTH_RETRY=0
            HEALTH_MAX=6
            until docker exec bisa-app curl -f -s http://localhost:3000/ || [ $HEALTH_RETRY -eq $HEALTH_MAX ]; do
              echo " Health check failed, retrying... ($HEALTH_RETRY/$HEALTH_MAX)"
              HEALTH_RETRY=$((HEALTH_RETRY+1))
              sleep 10
            done

            if [ $HEALTH_RETRY -eq $HEALTH_MAX ]; then
              echo " Health check failed after $HEALTH_MAX retries!"
              exit 1
            fi
            echo "Health check passed!"

            # Check PM2 status (if using PM2 inside container)
            echo "Application status:"
            docker exec bisa-app pm2 status || echo "PM2 not running or not installed"

            # PHASE 6: CLEANUP
            echo ""
            echo "PHASE 6: CLEANUP"
            echo "=========================================="
            echo "Cleaning up old images..."
            docker image prune -f

            echo ""
            echo "=========================================="
            echo "PRODUCTION DEPLOYMENT COMPLETED SUCCESSFULLY!"
            echo "=========================================="
            echo "Summary:"
            echo "  Image: Updated"
            echo "  Database: Migrated"
            echo "  Containers: Running"
            echo "  Health Check: Passed"
            echo "=========================================="

      - name: Notify deployment success
        if: success()
        run: |
          echo "🎉 Production deployment completed successfully!"
          echo "Database migrations: Applied"
          echo "Application: Running"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo " Production deployment FAILED!"
          echo "🔍 Please check the workflow logs for details"
          echo "🔗 Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"