name: Deploy to K3s Cluster

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      namespace:
        description: 'K3s namespace'
        required: false
        default: 'default'
      image_tag:
        description: 'Docker image tag (default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  K8S_NAMESPACE: ${{ github.event.inputs.namespace || 'default' }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=ref,event=branch
            ${{ github.event.inputs.image_tag != 'latest' && format('type=raw,value={0}', github.event.inputs.image_tag) || '' }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-k3s:
    name: Deploy to K3s
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Configure kubeconfig for K3s
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.K3S_KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Verify cluster connection
        run: |
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Create GHCR pull secret
        run: |
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace "$K8S_NAMESPACE" \
            --docker-server="$REGISTRY" \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply K3s ConfigMap (non-sensitive config)
        run: |
          kubectl create configmap bisa-backend-config \
            --namespace "$K8S_NAMESPACE" \
            --from-literal=NODE_ENV=production \
            --from-literal=PORT=3000 \
            --from-literal=CORS_ORIGINS="${{ secrets.CORS_ORIGINS }}" \
            --from-literal=CLIENT_HOST="${{ secrets.CLIENT_HOST }}" \
            --from-literal=API_PUBLIC_URL="${{ secrets.API_PUBLIC_URL }}" \
            --from-literal=MEDIA_BASE_URL="${{ secrets.MEDIA_BASE_URL }}" \
            --from-literal=LOG_LEVEL="${{ secrets.LOG_LEVEL || 'info' }}" \
            --from-literal=ML_SERVICE_URL="${{ secrets.ML_SERVICE_URL }}" \
            --from-literal=ML_PREDICT_ENABLED="${{ secrets.ML_PREDICT_ENABLED || 'true' }}" \
            --from-literal=CHROMA_HOST="${{ secrets.CHROMA_HOST }}" \
            --from-literal=CHROMA_DATABASE="${{ secrets.CHROMA_DATABASE }}" \
            --from-literal=CHROMA_COLLECTION="${{ secrets.CHROMA_COLLECTION }}" \
            --from-literal=REDIS_ENABLED="${{ secrets.REDIS_ENABLED || 'false' }}" \
            --from-literal=REDIS_URL="${{ secrets.REDIS_URL }}" \
            --from-literal=REDIS_KEY_PREFIX="${{ secrets.REDIS_KEY_PREFIX || 'bisa:v1' }}" \
            --from-literal=REDIS_DEFAULT_TTL_SECONDS="${{ secrets.REDIS_DEFAULT_TTL_SECONDS || '3600' }}" \
            --from-literal=READINESS_GATES_ENABLED="${{ secrets.READINESS_GATES_ENABLED || 'true' }}" \
            --from-literal=READINESS_ENFORCE_ADMIN="${{ secrets.READINESS_ENFORCE_ADMIN || 'false' }}" \
            --from-literal=REQUIRE_KYC_FOR_ACTIVE_PRODUCT="${{ secrets.REQUIRE_KYC_FOR_ACTIVE_PRODUCT || 'false' }}" \
            --from-literal=MEDIA_CHUNK_SIZE_BYTES="${{ secrets.MEDIA_CHUNK_SIZE_BYTES || '5242880' }}" \
            --from-literal=MEDIA_UPLOAD_SESSION_TTL_HOURS="${{ secrets.MEDIA_UPLOAD_SESSION_TTL_HOURS || '24' }}" \
            --from-literal=MEDIA_MAX_IMAGE_BYTES="${{ secrets.MEDIA_MAX_IMAGE_BYTES || '52428800' }}" \
            --from-literal=MEDIA_MAX_PDF_BYTES="${{ secrets.MEDIA_MAX_PDF_BYTES || '20971520' }}" \
            --from-literal=MEDIA_UPLOAD_PROXY_MODE="${{ secrets.MEDIA_UPLOAD_PROXY_MODE || 'true' }}" \
            --from-literal=PUBLIC_VERIFY_BASE_URL="${{ secrets.PUBLIC_VERIFY_BASE_URL }}" \
            --from-literal=SUPPORT_WHATSAPP="${{ secrets.SUPPORT_WHATSAPP }}" \
            --from-literal=SUPPORT_EMAIL="${{ secrets.SUPPORT_EMAIL }}" \
            --from-literal=RAJAONGKIR_BASE_URL="${{ secrets.RAJAONGKIR_BASE_URL }}" \
            --from-literal=RAJAONGKIR_DEFAULT_COURIERS="${{ secrets.RAJAONGKIR_DEFAULT_COURIERS }}" \
            --from-literal=RAG_ENABLED="${{ secrets.RAG_ENABLED || 'true' }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply K3s Secret (sensitive config)
        run: |
          kubectl create secret generic bisa-backend-secrets \
            --namespace "$K8S_NAMESPACE" \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=DATABASE_USER="${{ secrets.DATABASE_USER }}" \
            --from-literal=DATABASE_PASSWORD="${{ secrets.DATABASE_PASSWORD }}" \
            --from-literal=DATABASE_NAME="${{ secrets.DATABASE_NAME }}" \
            --from-literal=DATABASE_HOST="${{ secrets.DATABASE_HOST }}" \
            --from-literal=DATABASE_PORT="${{ secrets.DATABASE_PORT || '3306' }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=JWT_EXPIRES_IN="${{ secrets.JWT_EXPIRES_IN || '1d' }}" \
            --from-literal=JWT_REFRESH_EXPIRES_IN="${{ secrets.JWT_REFRESH_EXPIRES_IN || '30d' }}" \
            --from-literal=ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY }}" \
            --from-literal=ENCRYPTION_KEY_V2="${{ secrets.ENCRYPTION_KEY_V2 }}" \
            --from-literal=EMAIL_SMTP_HOST="${{ secrets.EMAIL_SMTP_HOST }}" \
            --from-literal=EMAIL_SMTP_PORT="${{ secrets.EMAIL_SMTP_PORT || '465' }}" \
            --from-literal=EMAIL_SMTP_SECURE="${{ secrets.EMAIL_SMTP_SECURE || 'true' }}" \
            --from-literal=EMAIL_SMTP_USER="${{ secrets.EMAIL_SMTP_USER }}" \
            --from-literal=EMAIL_SMTP_PASS="${{ secrets.EMAIL_SMTP_PASS }}" \
            --from-literal=EMAIL_FROM="${{ secrets.EMAIL_FROM }}" \
            --from-literal=EMAIL_SENDER_NAME="${{ secrets.EMAIL_SENDER_NAME }}" \
            --from-literal=R2_ACCOUNT_ID="${{ secrets.R2_ACCOUNT_ID }}" \
            --from-literal=R2_ACCESS_KEY_ID="${{ secrets.R2_ACCESS_KEY_ID }}" \
            --from-literal=R2_SECRET_ACCESS_KEY="${{ secrets.R2_SECRET_ACCESS_KEY }}" \
            --from-literal=R2_BUCKET_NAME="${{ secrets.R2_BUCKET_NAME }}" \
            --from-literal=R2_PUBLIC_URL="${{ secrets.R2_PUBLIC_URL }}" \
            --from-literal=XENDIT_PAYMENT_SECRET_KEY="${{ secrets.XENDIT_PAYMENT_SECRET_KEY }}" \
            --from-literal=XENDIT_PAYOUT_SECRET_KEY="${{ secrets.XENDIT_PAYOUT_SECRET_KEY }}" \
            --from-literal=XENDIT_REPORT_SECRET_KEY="${{ secrets.XENDIT_REPORT_SECRET_KEY }}" \
            --from-literal=XENDIT_PUBLIC_KEY="${{ secrets.XENDIT_PUBLIC_KEY }}" \
            --from-literal=XENDIT_WEBHOOK_TOKEN="${{ secrets.XENDIT_WEBHOOK_TOKEN }}" \
            --from-literal=PUSHER_APP_ID="${{ secrets.PUSHER_APP_ID }}" \
            --from-literal=PUSHER_KEY="${{ secrets.PUSHER_KEY }}" \
            --from-literal=PUSHER_SECRET="${{ secrets.PUSHER_SECRET }}" \
            --from-literal=PUSHER_CLUSTER="${{ secrets.PUSHER_CLUSTER }}" \
            --from-literal=USER_ID_RAJA_ONGKIR="${{ secrets.USER_ID_RAJA_ONGKIR }}" \
            --from-literal=SECRET_KEY_RAJA_ONGKIR="${{ secrets.SECRET_KEY_RAJA_ONGKIR }}" \
            --from-literal=SHIPPING_COST_API_KEY="${{ secrets.SHIPPING_COST_API_KEY }}" \
            --from-literal=PAYMENT_API_KEY="${{ secrets.PAYMENT_API_KEY }}" \
            --from-literal=QRISLY_API_KEY="${{ secrets.QRISLY_API_KEY }}" \
            --from-literal=DEEPSHEEK_API_KEY="${{ secrets.DEEPSHEEK_API_KEY }}" \
            --from-literal=DEEPSHEEK_MODEL="${{ secrets.DEEPSHEEK_MODEL }}" \
            --from-literal=CHROMA_API_KEY="${{ secrets.CHROMA_API_KEY }}" \
            --from-literal=CHROMA_TENANT="${{ secrets.CHROMA_TENANT }}" \
            --from-literal=PEXELS_API_KEY="${{ secrets.PEXELS_API_KEY }}" \
            --from-literal=PIXABAY_API_KEY="${{ secrets.PIXABAY_API_KEY }}" \
            --from-literal=FIREBASE_SERVICE_ACCOUNT="${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy K3s manifests
        run: |
          kubectl apply -f k3s/deployment.yaml --namespace "$K8S_NAMESPACE"
          kubectl apply -f k3s/service.yaml --namespace "$K8S_NAMESPACE"
          kubectl apply -f k3s/ingress.yaml --namespace "$K8S_NAMESPACE"

      - name: Verify deployment rollout
        run: |
          echo "=== Deployment Status ==="
          kubectl rollout status deployment/bisa-backend --namespace "$K8S_NAMESPACE" --timeout=300s

          echo ""
          echo "=== Pods ==="
          kubectl get pods -l app=bisa-backend --namespace "$K8S_NAMESPACE" -o wide

          echo ""
          echo "=== Services ==="
          kubectl get svc -l app=bisa-backend --namespace "$K8S_NAMESPACE"

          echo ""
          echo "=== Ingress ==="
          kubectl get ingress bisa-backend-ingress --namespace "$K8S_NAMESPACE" -o wide

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy-k3s]
    if: failure()
    steps:
      - name: Rollback K3s deployment
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.K3S_KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl rollout undo deployment/bisa-backend --namespace "$K8S_NAMESPACE" || echo "Nothing to rollback"
