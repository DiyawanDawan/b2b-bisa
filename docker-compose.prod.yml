version: '3.8'

services:
  app:
    image: ghcr.io/diyawandawan/b2b-bisa:latest
    pull_policy: always
    container_name: bisa-app
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
    env_file:
      - .env
    # Secrets come from env_file only — do not re-map via ${VAR} (breaks $, #, or literal ${DATABASE_URL}).
    environment:
      NODE_ENV: production
      PORT: "3000"
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      - redis
      - mysql
    restart: unless-stopped
    networks:
      - bisa-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:3000/health']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
      restart_policy:
        condition: on-failure
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  redis:
    image: redis:7-alpine
    container_name: backend-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - bisa-network
  mysql:
    image: mysql:8.0
    container_name: bisa-mysql
    env_file:
      - .env
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - bisa-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 20s
      interval: 30s
      retries: 3

networks:
  bisa-network:
    driver: bridge

volumes:
  redis_data:
  mysql_data:
