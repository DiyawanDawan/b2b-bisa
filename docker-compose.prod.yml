version: '3.8'

services:
  app:
    image: ghcr.io/diyawandawan/b2b-bisa:latest
    pull_policy: always
    container_name: bisa-app
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      PORT: "3000"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENCRYPTION_KEY_V2: ${ENCRYPTION_KEY_V2:-}
      CLIENT_HOST: ${CLIENT_HOST:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-bisa}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      API_PUBLIC_URL: ${API_PUBLIC_URL}
      MEDIA_BASE_URL: ${MEDIA_BASE_URL}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-587}
      EMAIL_SMTP_SECURE: ${EMAIL_SMTP_SECURE:-false}
      EMAIL_SMTP_USER: ${EMAIL_SMTP_USER}
      EMAIL_SMTP_PASS: ${EMAIL_SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_SENDER_NAME: ${EMAIL_SENDER_NAME:-BISA Platform}
      XENDIT_PAYMENT_SECRET_KEY: ${XENDIT_PAYMENT_SECRET_KEY}
      XENDIT_PAYOUT_SECRET_KEY: ${XENDIT_PAYOUT_SECRET_KEY}
      XENDIT_REPORT_SECRET_KEY: ${XENDIT_REPORT_SECRET_KEY}
      XENDIT_WEBHOOK_TOKEN: ${XENDIT_WEBHOOK_TOKEN}
      XENDIT_PUBLIC_KEY: ${XENDIT_PUBLIC_KEY}
      PUSHER_APP_ID: ${PUSHER_APP_ID}
      PUSHER_KEY: ${PUSHER_KEY}
      PUSHER_SECRET: ${PUSHER_SECRET}
      PUSHER_CLUSTER: ${PUSHER_CLUSTER}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      - redis
      - mysql
    restart: unless-stopped
    networks:
      - bisa-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:3000/health']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
      restart_policy:
        condition: on-failure
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  redis:
    image: redis:7-alpine
    container_name: backend-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - bisa-network
  mysql:
    image: mysql:8.0
    container_name: bisa-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - bisa-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 20s
      interval: 30s
      retries: 3

networks:
  bisa-network:
    driver: bridge

volumes:
  redis_data:
  mysql_data:
