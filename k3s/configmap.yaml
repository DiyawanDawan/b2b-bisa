apiVersion: v1
kind: ConfigMap
metadata:
  name: bisa-backend-config
  labels:
    app: bisa-backend
data:
  NODE_ENV: 'production'
  PORT: '3000'
  CORS_ORIGINS: '${CORS_ORIGINS}'
  CLIENT_HOST: '${CLIENT_HOST}'
  API_PUBLIC_URL: '${API_PUBLIC_URL}'
  MEDIA_BASE_URL: '${MEDIA_BASE_URL}'
  LOG_LEVEL: '${LOG_LEVEL}'
  ML_SERVICE_URL: '${ML_SERVICE_URL}'
  ML_PREDICT_ENABLED: '${ML_PREDICT_ENABLED}'
  CHROMA_HOST: '${CHROMA_HOST}'
  CHROMA_DATABASE: '${CHROMA_DATABASE}'
  CHROMA_COLLECTION: '${CHROMA_COLLECTION}'
  REDIS_ENABLED: '${REDIS_ENABLED}'
  REDIS_URL: '${REDIS_URL}'
  REDIS_KEY_PREFIX: '${REDIS_KEY_PREFIX}'
  REDIS_DEFAULT_TTL_SECONDS: '${REDIS_DEFAULT_TTL_SECONDS}'
  READINESS_GATES_ENABLED: '${READINESS_GATES_ENABLED}'
  READINESS_ENFORCE_ADMIN: '${READINESS_ENFORCE_ADMIN}'
  REQUIRE_KYC_FOR_ACTIVE_PRODUCT: '${REQUIRE_KYC_FOR_ACTIVE_PRODUCT}'
  MEDIA_CHUNK_SIZE_BYTES: '${MEDIA_CHUNK_SIZE_BYTES}'
  MEDIA_UPLOAD_SESSION_TTL_HOURS: '${MEDIA_UPLOAD_SESSION_TTL_HOURS}'
  MEDIA_MAX_IMAGE_BYTES: '${MEDIA_MAX_IMAGE_BYTES}'
  MEDIA_MAX_PDF_BYTES: '${MEDIA_MAX_PDF_BYTES}'
  MEDIA_UPLOAD_PROXY_MODE: '${MEDIA_UPLOAD_PROXY_MODE}'
  PUBLIC_VERIFY_BASE_URL: '${PUBLIC_VERIFY_BASE_URL}'
  SUPPORT_WHATSAPP: '${SUPPORT_WHATSAPP}'
  SUPPORT_EMAIL: '${SUPPORT_EMAIL}'
  RAJAONGKIR_BASE_URL: '${RAJAONGKIR_BASE_URL}'
  RAJAONGKIR_DEFAULT_COURIERS: '${RAJAONGKIR_DEFAULT_COURIERS}'
  RAG_ENABLED: '${RAG_ENABLED}'
