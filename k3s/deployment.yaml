apiVersion: apps/v1
kind: Deployment
metadata:
  name: bisa-backend
  labels:
    app: bisa-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bisa-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: bisa-backend
    spec:
      containers:
        - name: bisa-backend
          image: ghcr.io/diyawandawan/b2b-bisa:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: bisa-backend-secrets
            - configMapRef:
                name: bisa-backend-config
          resources:
            requests:
              memory: '256Mi'
              cpu: '100m'
            limits:
              memory: '512Mi'
              cpu: '500m'
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
      imagePullSecrets:
        - name: ghcr-pull-secret
      restartPolicy: Always
